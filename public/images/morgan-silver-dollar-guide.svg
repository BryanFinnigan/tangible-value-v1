<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Morgan Silver Dollar quick reference</title>
  <desc id="desc">A mobile-friendly Tangible Value infographic showing Morgan Dollar dates, silver content, mint marks, and value drivers.</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a2b"/>
      <stop offset="1" stop-color="#12344e"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="0.45" stop-color="#c7cbd0"/>
      <stop offset="1" stop-color="#8d949c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#navy)"/>
  <path d="M0 1310 C180 1230 280 1390 470 1310 S790 1240 1200 1320 V1500 H0Z" fill="#0b6b8f" opacity=".72"/>
  <path d="M0 1370 C210 1285 310 1440 540 1365 S900 1320 1200 1390" fill="none" stroke="#58b8d6" stroke-width="10" opacity=".55"/>

  <g transform="translate(78 66)">
    <circle cx="70" cy="70" r="62" fill="#d3a54d"/>
    <circle cx="70" cy="70" r="46" fill="#f0c76c" stroke="#7c581c" stroke-width="5"/>
    <text x="70" y="84" text-anchor="middle" font-family="Georgia,serif" font-size="56" font-weight="700" fill="#183247">T</text>
    <path d="M16 128 C50 112 82 146 124 122" fill="none" stroke="#46a8cb" stroke-width="9" stroke-linecap="round"/>
  </g>
  <text x="600" y="105" text-anchor="middle" font-family="Georgia,serif" font-size="76" font-weight="700" fill="#efc56a">MORGAN SILVER DOLLAR</text>
  <text x="600" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="31" letter-spacing="3" fill="#d7e1e8">A QUICK REFERENCE GUIDE</text>
  <line x1="92" y1="220" x2="1108" y2="220" stroke="#c99d45" stroke-width="3"/>

  <g filter="url(#shadow)">
    <circle cx="330" cy="490" r="205" fill="url(#coin)" stroke="#f3f3f3" stroke-width="10"/>
    <circle cx="330" cy="490" r="176" fill="none" stroke="#747b82" stroke-width="4"/>
    <path d="M269 585 C238 530 255 405 340 350 C398 397 420 472 390 560 C357 602 311 611 269 585Z" fill="#a6abb0" stroke="#656c72" stroke-width="5"/>
    <path d="M275 413 C317 350 376 345 405 384 C375 372 347 382 326 405 C304 429 286 432 275 413Z" fill="#7a8188"/>
    <text x="330" y="705" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#d7e1e8">OBVERSE</text>

    <circle cx="870" cy="490" r="205" fill="url(#coin)" stroke="#f3f3f3" stroke-width="10"/>
    <circle cx="870" cy="490" r="176" fill="none" stroke="#747b82" stroke-width="4"/>
    <path d="M785 515 Q870 400 955 515 Q920 485 884 480 L870 410 L856 480 Q820 485 785 515Z" fill="#858c92" stroke="#666d73" stroke-width="5"/>
    <path d="M790 545 Q870 610 950 545" fill="none" stroke="#747b82" stroke-width="9"/>
    <text x="870" y="705" text-anchor="middle" font-family="Georgia,serif" font-size="30" font-weight="700" fill="#d7e1e8">REVERSE</text>
  </g>

  <g font-family="Arial,sans-serif">
    <rect x="82" y="765" width="1036" height="150" rx="28" fill="#f5f0e6"/>
    <text x="145" y="824" font-size="30" font-weight="700" fill="#8a6f3d">MINTED</text>
    <text x="145" y="877" font-size="47" font-weight="700" fill="#162331">1878–1904 &amp; 1921</text>
    <text x="660" y="824" font-size="30" font-weight="700" fill="#8a6f3d">COMPOSITION</text>
    <text x="660" y="877" font-size="42" font-weight="700" fill="#162331">90% SILVER</text>

    <rect x="82" y="945" width="1036" height="180" rx="28" fill="#102f48" stroke="#c99d45" stroke-width="3"/>
    <text x="120" y="1000" font-size="29" font-weight="700" fill="#efc56a">PURE SILVER CONTENT</text>
    <text x="120" y="1069" font-size="61" font-weight="700" fill="#ffffff">0.7734 TROY OZ</text>
    <text x="675" y="1000" font-size="29" font-weight="700" fill="#efc56a">MINT MARKS</text>
    <text x="675" y="1069" font-size="43" font-weight="700" fill="#ffffff">P • O • S • CC • D</text>
  </g>

  <text x="600" y="1198" text-anchor="middle" font-family="Georgia,serif" font-size="43" font-weight="700" fill="#efc56a">WHAT DRIVES VALUE?</text>
  <g font-family="Arial,sans-serif" font-size="29" font-weight="700" fill="#ffffff">
    <rect x="94" y="1235" width="230" height="82" rx="20" fill="#173d59" stroke="#c99d45" stroke-width="2"/>
    <text x="209" y="1287" text-anchor="middle">DATE</text>
    <rect x="344" y="1235" width="230" height="82" rx="20" fill="#173d59" stroke="#c99d45" stroke-width="2"/>
    <text x="459" y="1287" text-anchor="middle">MINT MARK</text>
    <rect x="594" y="1235" width="230" height="82" rx="20" fill="#173d59" stroke="#c99d45" stroke-width="2"/>
    <text x="709" y="1287" text-anchor="middle">CONDITION</text>
    <rect x="844" y="1235" width="262" height="82" rx="20" fill="#173d59" stroke="#c99d45" stroke-width="2"/>
    <text x="975" y="1287" text-anchor="middle">DEMAND</text>
  </g>

  <text x="600" y="1392" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" fill="#f4f0e9">Same silver content does not mean the same collector value.</text>
  <text x="600" y="1436" text-anchor="middle" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#efc56a">TANGIBLE VALUE</text>
  <text x="600" y="1471" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" letter-spacing="2" fill="#d7e1e8">KNOWLEDGE • VALUE • CONFIDENCE</text>
</svg>